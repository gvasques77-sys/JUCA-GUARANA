// Auth helpers — usa sessão gerenciada pelo Supabase client
var _currentToken=null;

// Listener de auth state — mantém token atualizado automaticamente
sbClient.auth.onAuthStateChange(function(event,session){
  if(session&&session.access_token){
    _currentToken=session.access_token;
  }else{
    _currentToken=null;
  }
});

function getToken(){return _currentToken}

function logout(){
  _currentToken=null;
  sbClient.auth.signOut();
  window.location.href='/crm/login.html';
}

// Inicializa token a partir da sessão persistida pelo Supabase client
async function initToken(){
  var{data,error}=await sbClient.auth.getSession();
  if(error||!data.session){return null}
  _currentToken=data.session.access_token;
  return _currentToken;
}

// Refresh token via Supabase client
async function refreshToken(){
  try{
    var{data,error}=await sbClient.auth.refreshSession();
    if(error||!data.session)return null;
    _currentToken=data.session.access_token;
    return _currentToken;
  }catch(e){return null}
}

// Fetch com auth
function q(p,o){
  var token=getToken();
  if(!token){return Promise.resolve(null)}
  var opts=o||{};
  opts.headers=Object.assign({'Authorization':'Bearer '+token,'Content-Type':'application/json'},opts.headers||{});
  return fetch(API+p,opts).then(function(r){
    if(r.status===401){
      // Tentar refresh antes de desistir
      return refreshToken().then(function(newToken){
        if(!newToken){logout();return null}
        opts.headers['Authorization']='Bearer '+newToken;
        return fetch(API+p,opts).then(function(r2){
          if(r2.status===401||r2.status===403){logout();return null}
          return r2.json();
        }).catch(function(){return null});
      });
    }
    if(r.status===403){
      // 403 = usuário autenticado mas sem vínculo com clínica
      return r.json().then(function(body){
        console.error('[CRM] 403 em '+p+':',body.error||'acesso negado');
        return null;
      });
    }
    return r.json();
  }).catch(function(){return null});
}
