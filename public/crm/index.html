<html lang="pt-BR">

  <style>

    .btn-primary:hover { background: #2563EB; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    input, select { background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-primary); padding: 8px 12px; border-radius: 8px; font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; }
    input:focus, select:focus { border-color: var(--accent-blue); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 12px 16px; text-align: left; color: var(--text-muted); font-weight: 600; border-bottom: 1px solid var(--border); }

    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    @media (max-width: 768px) {

      .app-sidebar { width: 100% !important; flex-direction: row !important; padding: 10px !important; overflow-x: auto; border-right: none !important; border-bottom: 1px solid var(--border) !important; }
      .app-sidebar nav { flex-direction: row !important; gap: 4px !important; }
      .sidebar-brand { display: none !important; }
      .sidebar-footer { display: none !important; }
      .app-main { padding: 16px !important; }
      .grid-metrics { grid-template-columns: 1fr 1fr !important; }
    }
  </style>
</head>

            ag.upcoming.length===0 ? h(Empty,{msg:'Nenhum agendamento futuro',icon:'\uD83D\uDCCB'}) :
            ag.upcoming.slice(0,10).map(function(a,i){
              return h('div',{key:a.id||i,style:{display:'flex',alignItems:'center',gap:12,padding:'8px 0',borderBottom:'1px solid var(--border)'}},
                h('div',{style:{width:80,fontSize:12,color:'var(--text-muted)',flexShrink:0}},fmtDate(a.appointment_date)),
                h('div',{className:'mono',style:{width:50,fontSize:13,fontWeight:600,color:'var(--accent-cyan)',flexShrink:0}},(a.start_time||'').substring(0,5)),
                h('div',{style:{flex:1,fontSize:13}},a.patient_name),
                h('div',{style:{fontSize:12,color:'var(--text-muted)'}},a.doctor_name)
              );
            })
          )
        )
      );
    }

    /* ===== TELA 6 ===== */
    function ReportPage() {
      var _r = useState(null), rpt = _r[0], setRpt = _r[1];
      var _l = useState(true), ld = _l[0], setLd = _l[1];
      var _g = useState(false), gen = _g[0], setGen = _g[1];
      useEffect(function(){ api('/reports/latest').then(function(d){setRpt(d&&d.report?d.report:null);setLd(false);}); },[]);
      function doGen(){ setGen(true); api('/reports/generate',{method:'POST'}).then(function(d){if(d&&d.report)setRpt(d.report);setGen(false);}); }
      function renderTxt(txt){
        if(!txt)return null;
        return txt.split('\n').map(function(ln,i){
          if(ln.indexOf('## ')===0)return h('h2',{key:i},ln.slice(3));
          if(ln.indexOf('### ')===0)return h('h3',{key:i},ln.slice(4));
          if(ln.indexOf('- ')===0)return h('li',{key:i},ln.slice(2));
          if(ln.trim()==='')return h('br',{key:i});
          return h('p',{key:i},ln);
        });
      }
      return h('div',{className:'fade-in'},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}},
          h('h2',{style:{fontSize:22,fontWeight:700}},'Relat\u00f3rio Inteligente'),
          h('button',{className:'btn-primary',onClick:doGen,disabled:gen},gen?'Gerando...':'\uD83D\uDD04 Gerar Relat\u00f3rio')
        ),
        ld ? h(Loading) :
        rpt ? h('div',{className:'card'},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}},
            h('div',null,
              h('span',{className:'badge',style:{background:'rgba(16,185,129,0.15)',color:'#10B981'}},rpt.report_type==='weekly'?'Semanal':rpt.report_type),
              h('span',{style:{fontSize:12,color:'var(--text-muted)',marginLeft:8}},fmtDate(rpt.period_start)+' \u2014 '+fmtDate(rpt.period_end))
            ),
            h('span',{style:{fontSize:11,color:'var(--text-muted)'}},'Gerado: '+fmtDT(rpt.created_at))
          ),
          h('div',{className:'report-text'},renderTxt(rpt.analysis_text)),
          rpt.tokens_used>0?h('div',{style:{marginTop:16,paddingTop:12,borderTop:'1px solid var(--border)',fontSize:11,color:'var(--text-muted)'}},'Modelo: '+rpt.model_used+' | Tokens: '+rpt.tokens_used+' | Custo: $'+rpt.cost_estimated):null
        ) :
        h('div',{className:'card'}, h(Empty,{msg:'Nenhum relat\u00f3rio gerado. Clique em "Gerar Relat\u00f3rio".',icon:'\uD83D\uDCCA'}))
      );
    }

    /* ===== APP ===== */
    function App() {
      var _p = useState('overview'), pg = _p[0], setPg = _p[1];
      var _s = useState(null), sel = _s[0], setSel = _s[1];
      function onSel(id,nm){ setSel({id:id,name:nm}); setPg('timeline'); }
      var nav = [
        {id:'overview',label:'Vis\u00e3o Geral',icon:'\uD83D\uDCCA'},
        {id:'patients',label:'Pacientes',icon:'\uD83D\uDC65'},
        {id:'tasks',label:'Tarefas',icon:'\u2705'},
        {id:'agenda',label:'Agenda',icon:'\uD83D\uDCC5'},
        {id:'report',label:'Relat\u00f3rio',icon:'\uD83D\uDCDD'}
      ];
      function page(){
        if(pg==='overview')return h(OverviewPage);
        if(pg==='patients')return h(PatientsPage,{onSelect:onSel});
        if(pg==='timeline'&&sel)return h(TimelinePage,{pid:sel.id,pname:sel.name,onBack:function(){setPg('patients')}});
        if(pg==='tasks')return h(TasksPage);
        if(pg==='agenda')return h(AgendaPage);
        if(pg==='report')return h(ReportPage);
        return h(OverviewPage);
      }
      return h('div',{className:'app-layout',style:{display:'flex',minHeight:'100vh'}},
        h('aside',{className:'app-sidebar',style:{width:220,background:'var(--bg-secondary)',borderRight:'1px solid var(--border)',padding:'20px 12px',display:'flex',flexDirection:'column',flexShrink:0}},
          h('div',{className:'sidebar-brand',style:{marginBottom:28,padding:'0 8px'}},
            h('div',{style:{fontSize:18,fontWeight:700,color:'var(--accent-emerald)'}},'JUCA'),
            h('div',{style:{fontSize:11,fontWeight:600,color:'var(--text-muted)',letterSpacing:'0.08em'}},'GUARAN\u00C1 CRM')
          ),
          h('nav',{style:{display:'flex',flexDirection:'column',gap:4}},
            nav.map(function(it){
              return h('a',{key:it.id,className:'sidebar-link'+(pg===it.id?' active':''),onClick:function(){setPg(it.id)}},
                h('span',null,it.icon),' ',it.label
              );
            })
          ),
          h('div',{className:'sidebar-footer',style:{marginTop:'auto',padding:'12px 8px',borderTop:'1px solid var(--border)'}},
            h('div',{style:{fontSize:11,color:'var(--text-muted)'}},'GV Automa\u00e7\u00f5es'),
            h('div',{style:{fontSize:10,color:'var(--text-muted)',marginTop:2}},'v1.0')
          )
        ),
        h('main',{className:'app-main',style:{flex:1,padding:28,overflowY:'auto',maxHeight:'100vh'}}, page())
      );
    }

    ReactDOM.render(h(App), document.getElementById('root'));
  </script>
</body>
</html>
